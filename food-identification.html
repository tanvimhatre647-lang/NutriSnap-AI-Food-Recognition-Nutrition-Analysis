<script src="js/utils.js"></script>

<script>

let selectedFile = null
let cameraStream = null

const API_KEY = "eb1cc18b42ec412ca804de14de647c81"

function detectFoodFromName(filename){

filename = filename.toLowerCase();

if(filename.includes("dhokla")) return "Dhokla";
if(filename.includes("pizza")) return "Pizza";
if(filename.includes("burger")) return "Burger";
if(filename.includes("biryani")) return "Biryani";
if(filename.includes("salad")) return "Salad";
if(filename.includes("pasta")) return "Pasta";
if(filename.includes("sandwich")) return "Sandwich";
if(filename.includes("idli")) return "Idli";
if(filename.includes("dosa")) return "Dosa";

return null;

}

document.addEventListener("DOMContentLoaded",()=>{

const uploadZone = document.getElementById("uploadZone")
const fileInput = document.getElementById("fileInput")

NutriSnapUtils.initializeFileUpload(uploadZone,fileInput,handleFileUpload)

document.getElementById("analyzeBtn").addEventListener("click",analyzeFood)

})

function handleFileUpload(file,imageSrc){

selectedFile = file

document.getElementById("analysisSection").style.display="block"

}

function openCamera(){

const modal = document.getElementById("cameraModal")
const video = document.getElementById("cameraStream")

navigator.mediaDevices.getUserMedia({video:true})
.then(stream=>{

cameraStream = stream
video.srcObject = stream
video.play()

})

}

async function analyzeFood(){

if(!selectedFile){

NutriSnapUtils.showNotification("Upload image first","warning");
return;

}

if(selectedFile.type === "sample"){
    const analysisData = generateAnalysisData(selectedFile);
    NutriSnapUtils.saveToLocalStorage('currentAnalysis', analysisData);
    window.location.href = "nutrition-info.html";
    return;
}

const btn = document.getElementById("analyzeBtn")

NutriSnapUtils.showLoading(btn,"AI scanning...")

try{

const formData = new FormData()
formData.append("file",selectedFile)

const res = await fetch(`https://api.spoonacular.com/food/images/analyze?apiKey=${API_KEY}`,{

method:"POST",
body:formData

})

const data = await res.json()

console.log(data)

let foodName = data.category?.name || "Food";

// fallback detection using filename
const fallbackFood = detectFoodFromName(selectedFile.name);

if(fallbackFood){
foodName = fallbackFood;
}

const nutritionRes = await fetch(
`https://api.spoonacular.com/recipes/guessNutrition?title=${foodName}&apiKey=${API_KEY}`
)

const nutritionData = await nutritionRes.json()

const analysisData = {

foodName: foodName,

confidence: Math.round((data.category?.probability || 0.8) * 100),

image: "🍽️",

nutrition:{

calories: Math.round(nutritionData.calories?.value || 200),
protein: Math.round(nutritionData.protein?.value || 10),
carbs: Math.round(nutritionData.carbs?.value || 30),
fat: Math.round(nutritionData.fat?.value || 10),

fiber: 5,
sugar: Math.round((nutritionData.carbs?.value || 30) * 0.2),
sodium: 300,

 vitamins:{
  "Vitamin A": 12,
  "Vitamin C": 8,
  "Vitamin B6": 6
 },

 minerals:{
  "Calcium": 150,
  "Iron": 8,
  "Magnesium": 40,
  "Potassium": 300

}
}
};


NutriSnapUtils.saveToLocalStorage("currentAnalysis",analysisData)

NutriSnapUtils.hideLoading(btn)

NutriSnapUtils.showNotification(`AI detected ${foodName}`,"success")

setTimeout(()=>{

window.location.href="nutrition-info.html"

},1200)

}

catch(error){

console.error(error)

NutriSnapUtils.hideLoading(btn)

NutriSnapUtils.showNotification("AI analysis failed","error")

}

}

function capturePhoto(){

const video = document.getElementById("cameraStream");

const canvas = document.createElement("canvas");

canvas.width = video.videoWidth;
canvas.height = video.videoHeight;

const ctx = canvas.getContext("2d");

ctx.drawImage(video,0,0);

canvas.toBlob(blob => {

selectedFile = new File([blob],"camera-food.jpg",{type:"image/jpeg"});

document.getElementById("analysisSection").style.display="block";

closeCamera();

});

}

function closeCamera(){

document.getElementById("cameraModal").style.display="none";

if(cameraStream){
cameraStream.getTracks().forEach(track=>track.stop());
}

}
</script>
