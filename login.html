<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - NutriSnap</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .auth-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: radial-gradient(circle at top right, rgba(232, 245, 232, 0.8), transparent 60%),
                        radial-gradient(circle at bottom left, rgba(250, 250, 250, 1), transparent 60%);
            padding: 2rem;
        }
        
        .auth-card {
            background: white;
            border-radius: 24px;
            padding: 3rem;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.08);
            width: 100%;
            max-width: 450px;
            border: 1px solid rgba(224, 224, 224, 0.5);
        }
        
        .back-link {
            display: inline-block;
            color: var(--text-light);
            text-decoration: none;
            margin-bottom: 2rem;
            font-weight: 500;
            transition: color 0.3s ease;
        }
        
        .back-link:hover {
            color: var(--primary-green);
        }
        
        .auth-title {
            font-size: 2rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
            color: var(--text-dark);
        }
        
        .auth-subtitle {
            color: var(--text-light);
            margin-bottom: 2rem;
        }
    </style>
</head>
<body>
    <div class="auth-container">
        <div class="auth-card fade-in-up">
            <a href="welcome.html" class="back-link">← Back</a>
            
            <h1 class="auth-title">Welcome Back</h1>
            <p class="auth-subtitle">Sign in to track your diet journey.</p>
            
            <form id="loginForm">
                <div class="form-group">
                    <label class="form-label" for="email">Email Address</label>
                    <input type="email" id="email" class="form-input" placeholder="you@example.com" required>
                </div>
                
                <div class="form-group">
                    <label class="form-label" for="password">Password</label>
                    <input type="password" id="password" class="form-input" placeholder="••••••••" required>
                </div>
                
                <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 1rem;">Sign In</button>
            </form>
            
            <p style="text-align: center; margin-top: 2rem; font-size: 0.9rem;">
                Don't have an account? <span style="color: var(--primary-green); font-weight: 600; cursor: pointer;">Sign up here</span>
            </p>
        </div>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', (e) => {
            e.preventDefault();
            
            // Basic validation
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            
            if (email && password) {
                // Simulate saving user auth state
                localStorage.setItem('nutrisnap_auth', 'true');
                localStorage.setItem('nutrisnap_user_email', email);
                
                // If they haven't completed onboarding, take them there. Otherwise, index.
                const hasCompletedOnboarding = localStorage.getItem('nutrisnap_onboarding_completed');
                
                if (hasCompletedOnboarding === 'true') {
                    window.location.href = 'index.html';
                } else {
                    window.location.href = 'onboarding.html';
                }
            }
        });
    </script>
</body>
</html>
