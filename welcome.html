<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome - NutriSnap</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .welcome-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: radial-gradient(circle at top right, rgba(232, 245, 232, 0.8), transparent 60%),
                        radial-gradient(circle at bottom left, rgba(250, 250, 250, 1), transparent 60%);
            padding: 2rem;
        }
        
        .welcome-card {
            background: white;
            border-radius: 24px;
            padding: 4rem 3rem;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.08);
            text-align: center;
            max-width: 500px;
            width: 100%;
            border: 1px solid rgba(224, 224, 224, 0.5);
        }
        
        .welcome-logo {
            width: 100px;
            height: 100px;
            border-radius: 20px;
            margin-bottom: 1.5rem;
            box-shadow: 0 8px 24px rgba(76, 175, 80, 0.2);
        }
        
        .welcome-title {
            font-size: 2.5rem;
            font-weight: 800;
            color: var(--primary-green);
            margin-bottom: 1rem;
            letter-spacing: -0.5px;
        }
        
        .welcome-subtitle {
            color: var(--text-light);
            font-size: 1.1rem;
            margin-bottom: 3rem;
        }
        
        .welcome-buttons {
            display: flex;
            flex-direction: column;
            gap: 1.2rem;
        }
        
        .btn-full {
            width: 100%;
            padding: 16px;
            font-size: 1.1rem;
        }
    </style>
</head>
<body>
    <div class="welcome-container">
        <div class="welcome-card fade-in-up">
            <img src="images/logo.jpg" alt="NutriSnap Logo" class="welcome-logo">
            <h1 class="welcome-title">NutriSnap</h1>
            <p class="welcome-subtitle">Your personal AI nutrition assistant and daily diet companion.</p>
            
            <div class="welcome-buttons">
                <a href="login.html" class="btn btn-primary btn-full">Login / Sign In</a>
                <a href="index.html" id="guestBtn" class="btn btn-outline btn-full">Continue as Guest</a>
            </div>
        </div>
    </div>

    <script>
        // Check if already authenticated or visited as guest
        document.addEventListener('DOMContentLoaded', () => {
            const authStatus = localStorage.getItem('nutrisnap_auth');
            
            if (authStatus === 'true') {
                window.location.href = 'index.html';
            } else if (authStatus === 'guest') {
                // If they previously chose guest, maybe take them straight to index.
                // But for safety on the welcome screen, we'll let them choose again if they navigated here manually.
            }
        });

        document.getElementById('guestBtn').addEventListener('click', (e) => {
            e.preventDefault();
            localStorage.setItem('nutrisnap_auth', 'guest');
            window.location.href = 'index.html';
        });
    </script>
</body>
</html>
